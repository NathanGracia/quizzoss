<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzoss</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo" onclick="goHome()">
        <span class="logo-mark">◈</span>
        <span>Quizzoss</span>
      </div>
    </div>
  </header>

  <main>

    <!-- Home : quiz launcher + bibliothèque -->
    <div id="state-home" class="state">

      <div class="home-quiz">
        <div class="home-hero">
          <div class="hero-index">Révision · IA · Notes</div>
          <div class="home-hero-content">
            <div class="hero-tag">Gemini AI · Actif</div>
            <h1>
              Testez<br>
              vos <span class="accent">notes</span>
            </h1>
            <ul class="home-how">
              <li><span class="how-bullet">// 01</span>Question tirée au hasard de vos notes</li>
              <li><span class="how-bullet">// 02</span>L'IA évalue et propose la réponse idéale</li>
              <li><span class="how-bullet">// 03</span>Tuteur IA pour approfondir</li>
            </ul>
            <div class="home-launcher">
              <select id="topic-select" class="topic-select">
                <option value="">_ tous les sujets</option>
              </select>
              <label class="mode-toggle">
                <input type="checkbox" id="mcq-check" checked>
                <span class="toggle-track"><span class="toggle-knob"></span></span>
                <span class="toggle-label">QCM</span>
              </label>
              <button class="btn btn-primary btn-lg" onclick="startSession()">Lancer →</button>
            </div>
          </div>
        </div>
      </div>

      <div class="home-library">
        <div class="home-section-header">
          <div>
            <h2 class="home-section-title">Bibliothèque</h2>
            <p class="home-section-sub">Toutes vos notes</p>
          </div>
          <div class="rebuild-controls">
            <span id="rebuild-status" class="rebuild-status"></span>
            <button class="btn btn-sm" id="rebuild-btn" onclick="triggerRebuild()">↻ Mettre à jour les questions</button>
          </div>
        </div>
        <div id="library-list" class="library-list"></div>
      </div>

    </div>

    <!-- Quiz actif -->
    <div id="state-quiz" class="state hidden">
      <div class="session-progress">
        <div class="progress-info">
          <span id="q-progress" class="progress-label">Question 1 / 10</span>
          <span id="q-score" class="score-badge">0 ✓</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="source-badge">
        <span class="badge-file" id="src-file"></span>
        <span class="badge-sep">›</span>
        <span class="badge-section" id="src-section"></span>
      </div>

      <div class="question-card" id="question-card">
        <div id="q-skeleton" class="skeleton">
          <div class="sk-line" style="width:85%"></div>
          <div class="sk-line" style="width:60%;margin-top:.75rem"></div>
        </div>
        <p id="q-text" class="q-text hidden"></p>
      </div>

      <div id="answer-area" class="answer-area hidden">
        <textarea
          id="answer-input"
          class="answer-input"
          placeholder="Votre réponse… (Entrée pour valider)"
          rows="3"
          onkeydown="handleKey(event)"
        ></textarea>
        <div id="mcq-options" class="mcq-options hidden"></div>
        <div class="actions">
          <button id="answer-validate-btn" class="btn btn-primary" onclick="submitAnswer()">Valider ✓</button>
          <button class="btn btn-ghost" onclick="skipQuestion()">Passer →</button>
        </div>
      </div>

      <div id="result-area" class="result-area hidden">
        <div id="result-card" class="result-card"></div>
        <div id="inline-chat" class="inline-chat hidden">
          <div id="inline-msgs" class="inline-msgs"></div>
          <div class="inline-chat-row">
            <textarea
              id="inline-input"
              class="inline-input"
              placeholder="Une question sur cette réponse… (Entrée pour envoyer)"
              rows="2"
              onkeydown="handleInlineKey(event)"
            ></textarea>
            <button class="btn btn-primary" onclick="sendInlineChat()">→</button>
          </div>
        </div>
        <button id="next-btn" class="btn btn-primary" style="margin-top:1.25rem">
          Question suivante →
        </button>
      </div>
    </div>

    <!-- Écran de fin -->
    <div id="state-end" class="state hidden">
      <div class="end-wrap">
        <div class="end-icon">◈</div>
        <h1 id="end-title">Session terminée !</h1>
        <div id="end-score" class="end-score">0 / 10</div>
        <div class="end-bar-wrap">
          <div id="end-bar" class="end-bar"></div>
        </div>
        <p id="end-msg" class="end-msg"></p>
        <div class="end-actions">
          <button class="btn btn-primary btn-lg" onclick="startSession()">Recommencer →</button>
          <button class="btn btn-ghost btn-lg" onclick="goHome()">Accueil</button>
        </div>
      </div>
      <div id="end-recap" class="end-recap"></div>
    </div>

    <!-- Viewer de note -->
    <div id="state-note" class="state hidden">
      <div class="note-nav">
        <button class="btn btn-ghost btn-sm" onclick="closeNote()">← Retour</button>
        <span id="note-view-title" class="note-view-title"></span>
        <button class="btn btn-ghost btn-sm" id="edit-btn" onclick="toggleEdit()">Modifier</button>
      </div>
      <div class="note-layout">
        <div id="note-view-body" class="note-body"></div>
        <div id="note-edit-area" class="note-edit-area hidden">
          <textarea id="note-editor" class="note-editor"></textarea>
          <div class="edit-actions">
            <button class="btn btn-primary" onclick="saveNote()">Sauvegarder</button>
            <button class="btn btn-ghost" onclick="cancelEdit()">Annuler</button>
          </div>
        </div>
        <aside id="note-toc" class="note-toc hidden"></aside>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js?v=21"></script>
</body>
</html>
