name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/quizzoss

            echo "── Pull des dernières modifications ──"
            git pull origin master

            echo "── Rebuild et redémarrage Docker ──"
            docker compose up -d --build --remove-orphans

            echo "── Nettoyage images inutilisées ──"
            docker image prune -f

            echo "── Healthcheck ──"
            sleep 5
            curl -sf http://localhost:3005/api/topics > /dev/null \
              && echo "✓ Serveur opérationnel" \
              || (echo "✗ Healthcheck échoué" && docker compose logs --tail=30 && exit 1)
